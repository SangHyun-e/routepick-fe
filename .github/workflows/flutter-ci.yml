name: Flutter CI
on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze

      # 테스트 감지
      - name: Detect tests
        id: detect
        shell: bash
        run: |
          echo "has_tests=false" >> "$GITHUB_OUTPUT"
          echo "browser=false" >> "$GITHUB_OUTPUT"

          if compgen -G "test/**_test.dart" >/dev/null; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
            if grep -RIl "@TestOn('browser')" test >/dev/null 2>&1 || \
               grep -RIl '@TestOn("browser")' test >/dev/null 2>&1; then
              echo "browser=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      # 브라우저 전용 테스트면 Chrome
      - name: Run tests on Chrome with coverage
        if: steps.detect.outputs.has_tests == 'true' && steps.detect.outputs.browser == 'true'
        run: |
          flutter config --enable-web
          flutter test --platform chrome --coverage

      # 일반(VM) 테스트
      - name: Run tests on VM with coverage
        if: steps.detect.outputs.has_tests == 'true' && steps.detect.outputs.browser != 'true'
        run: flutter test --coverage

      # 테스트 없으면 스킵(성공 처리)
      - name: No tests found — skip
        if: steps.detect.outputs.has_tests != 'true'
        run: echo "No tests found — skipping."

      - name: Build web release
        run: |
          flutter config --enable-web
          flutter build web --release
